services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consulting_api
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/consulting_api?sslmode=disable
      JWT_SIGNING_KEY: local-development-signing-key-change-me-32bytes
      HTTP_ADDR: ":8080"
