name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-validate:
    name: schema-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate backlog.v1.json
        run: python -m jsonschema -i backlog.v1.json backlog.v1.schema.json

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        if: steps.detect.outputs.has_go == 'true'
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        if: steps.detect.outputs.has_go == 'true'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Skip lint (no Go module yet)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No go.mod present yet; lint skipped."

  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        if: steps.detect.outputs.has_go == 'true'
        run: go test ./...

      - name: Skip tests (no Go module yet)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No go.mod present yet; tests skipped."

  race-test:
    name: race-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run race tests
        if: steps.detect.outputs.has_go == 'true'
        run: go test -race ./...

      - name: Skip race tests (no Go module yet)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No go.mod present yet; race tests skipped."

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        if: steps.detect.outputs.has_go == 'true'
        run: go build ./...

      - name: Docker build
        if: steps.detect.outputs.has_go == 'true'
        run: docker build -t consulting-revenue-platform-api:ci .

      - name: Skip build (no Go module yet)
        if: steps.detect.outputs.has_go != 'true'
        run: echo "No go.mod present yet; build skipped."

  migrate-check:
    name: migrate-check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migrate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run migrations up
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/migrate_ci?sslmode=disable
        run: go run ./cmd/migrate -direction up

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        env:
          GOTOOLCHAIN: auto
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
